<section id="skills" class="skills-section">
  <div class="section">
    <div class="divider"></div>
    <h2 class="section-title">Technical <span>Skills</span></h2>
    <p class="section-subtitle">Technologies used across production systems</p>

    <div class="skills-grid">
      @for (group of skillGroups; track group.category) {
        <div class="skill-card">
          <div class="skill-card-header">
            <span class="skill-icon">{{ group.icon }}</span>
            <h3>{{ group.category }}</h3>
          </div>
          <div class="chip-list">
            @for (skill of group.skills; track skill) {
              <span class="skill-chip">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
